# Temporal Server (local dev — auto-setup with PostgreSQL)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: the-crew
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      enableServiceLinks: false
      containers:
        - name: temporal
          image: temporalio/auto-setup:latest
          ports:
            - containerPort: 7233
          env:
            - name: DB
              value: postgres12_pgx
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_SEEDS
              value: postgres
            - name: DBNAME
              value: temporal
            - name: VISIBILITY_DBNAME
              value: temporal_visibility
            - name: POSTGRES_USER
              value: svc_temporal
            - name: POSTGRES_PWD
              value: svc_temporal
            - name: SKIP_DB_CREATE
              value: "true"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: the-crew
spec:
  selector:
    app: temporal
  ports:
    - port: 7233
      targetPort: 7233
---
# Temporal UI
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: the-crew
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
    spec:
      enableServiceLinks: false
      containers:
        - name: temporal-ui
          image: temporalio/ui:latest
          ports:
            - containerPort: 8080
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal:7233
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: the-crew
spec:
  selector:
    app: temporal-ui
  ports:
    - port: 8080
      targetPort: 8080
