apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform
  namespace: the-crew
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform
  template:
    metadata:
      labels:
        app: platform
    spec:
      initContainers:
        - name: prisma-migrate
          image: the-crew/platform
          command:
            - sh
            - -c
            - |
              echo "Running Prisma migrations for platform..."
              cd services/platform && npx prisma migrate deploy
              echo "Migrations complete."
          env:
            - name: DATABASE_URL
              value: postgresql://svc_platform:svc_platform@postgres:5432/platform
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
      containers:
        - name: platform
          image: the-crew/platform
          ports:
            - containerPort: 4010
          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: DATABASE_URL
              value: postgresql://svc_platform:svc_platform@postgres:5432/platform
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: platform
  namespace: the-crew
spec:
  selector:
    app: platform
  ports:
    - port: 4010
      targetPort: 4010
