apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform
  namespace: the-crew
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform
  template:
    metadata:
      labels:
        app: platform
    spec:
      containers:
        - name: platform
          image: the-crew/platform
          ports:
            - containerPort: 4010
          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: DATABASE_URL
              value: postgresql://thecrew:thecrew@postgres:5432/thecrew?search_path=platform
            - name: PERSISTENCE_MODE
              value: drizzle
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: platform
  namespace: the-crew
spec:
  selector:
    app: platform
  ports:
    - port: 4010
      targetPort: 4010
