# Single PostgreSQL instance with multiple databases and service users
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: the-crew
data:
  init-databases.sql: |
    -- Service users (one per microservice)
    CREATE USER svc_platform WITH PASSWORD 'svc_platform';
    CREATE USER svc_company_design WITH PASSWORD 'svc_company_design';
    CREATE USER svc_temporal WITH PASSWORD 'svc_temporal';

    -- Databases with dedicated owners
    CREATE DATABASE platform OWNER svc_platform;
    CREATE DATABASE company_design OWNER svc_company_design;
    CREATE DATABASE temporal OWNER svc_temporal;
    CREATE DATABASE temporal_visibility OWNER svc_temporal;

    -- Isolate databases: revoke public connect
    REVOKE CONNECT ON DATABASE platform FROM PUBLIC;
    REVOKE CONNECT ON DATABASE company_design FROM PUBLIC;
    REVOKE CONNECT ON DATABASE temporal FROM PUBLIC;
    REVOKE CONNECT ON DATABASE temporal_visibility FROM PUBLIC;
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: the-crew
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: the-crew
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: thecrew_admin
            - name: POSTGRES_PASSWORD
              value: thecrew_admin
            - name: POSTGRES_DB
              value: postgres
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ['pg_isready', '-U', 'thecrew_admin', '-d', 'postgres']
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-scripts
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: the-crew
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
