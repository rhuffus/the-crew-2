apiVersion: apps/v1
kind: Deployment
metadata:
  name: company-design
  namespace: the-crew
spec:
  replicas: 1
  selector:
    matchLabels:
      app: company-design
  template:
    metadata:
      labels:
        app: company-design
    spec:
      initContainers:
        - name: prisma-migrate
          image: the-crew/company-design
          command:
            - sh
            - -c
            - |
              echo "Running Prisma migrations for company-design..."
              cd services/company-design && npx prisma migrate deploy
              echo "Migrations complete."
          env:
            - name: DATABASE_URL
              value: postgresql://svc_company_design:svc_company_design@postgres:5432/company_design
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
      containers:
        - name: company-design
          image: the-crew/company-design
          ports:
            - containerPort: 4020
          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: DATABASE_URL
              value: postgresql://svc_company_design:svc_company_design@postgres:5432/company_design
            - name: TEMPORAL_ADDRESS
              value: temporal:7233
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: company-design
  namespace: the-crew
spec:
  selector:
    app: company-design
  ports:
    - port: 4020
      targetPort: 4020
