apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: the-crew
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command: ['sh', '-c', 'until pg_isready -h postgres -U thecrew; do sleep 1; done']
      containers:
        - name: migrate
          image: the-crew/company-design
          command:
            - sh
            - -c
            - |
              echo "Creating schemas..."
              PGPASSWORD=thecrew psql -h postgres -U thecrew -d thecrew -c "CREATE SCHEMA IF NOT EXISTS platform; CREATE SCHEMA IF NOT EXISTS company_design;"
              echo "Schemas created."
          env:
            - name: DATABASE_URL
              value: postgresql://thecrew:thecrew@postgres:5432/thecrew
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
